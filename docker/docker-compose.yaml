services:
  redis-server:
    image: redis:7-alpine
    container_name: redis_server
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass mysecretpassword
    restart: unless-stopped

  redis-client:
    image: redis:7-alpine
    container_name: redis_client
    # Keeps the container running so you can exec into it
    command: tail -f /dev/null
    depends_on:
      - redis-server

volumes:
  redis_data:
